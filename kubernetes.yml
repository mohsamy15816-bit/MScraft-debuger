apiVersion: v1
kind: Namespace
metadata:
  name: msshop50

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: msshop50-server
  namespace: msshop50
spec:
  replicas: 25  # 25 instances for 100,000 concurrent players capacity
  selector:
    matchLabels:
      app: msshop50-server
  template:
    metadata:
      labels:
        app: msshop50-server
    spec:
      containers:
      - name: msshop50-server
        image: msshop50:latest
        ports:
        - containerPort: 3000
        env:
        - name: PORT
          value: "3000"
        - name: NODE_ENV
          value: production
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /ready
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 10

---
apiVersion: v1
kind: Service
metadata:
  name: msshop50-service
  namespace: msshop50
spec:
  selector:
    app: msshop50-server
  ports:
  - protocol: TCP
    port: 80
    targetPort: 3000
  type: LoadBalancer

---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: msshop50-hpa
  namespace: msshop50
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: msshop50-server
  minReplicas: 10
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80

---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: msshop50
spec:
  ports:
  - port: 6379
  selector:
    app: redis

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: redis
  namespace: msshop50
spec:
  replicas: 1
  selector:
    matchLabels:
      app: redis
  template:
    metadata:
      labels:
        app: redis
    spec:
      containers:
      - name: redis
        image: redis:7-alpine
        ports:
        - containerPort: 6379
        resources:
          requests:
            memory: "512Mi"
            cpu: "250m"
          limits:
            memory: "1Gi"
            cpu: "500m"
        volumeMounts:
        - name: redis-storage
          mountPath: /data
      volumes:
      - name: redis-storage
        emptyDir: {}

---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: msshop50-network-policy
  namespace: msshop50
spec:
  podSelector:
    matchLabels:
      app: msshop50-server
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - from:
    - namespaceSelector:
        matchLabels:
          name: msshop50
  egress:
  - to:
    - namespaceSelector:
        matchLabels:
          name: msshop50
